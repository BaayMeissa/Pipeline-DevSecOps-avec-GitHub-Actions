name: DevSecOps Pipeline
on: [push, pull_request]
jobs:
# ═══════════════════════════════════════
# 1. BUILD
# Construit l'image Docker de l'application
# Permet de valider que le code compile et de préparer l'image pour le scan de vulnérabilités
# ═══════════════════════════════════════
 build:
    name: 🏗 Build
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - name: Build Docker image
          run: docker build -t vuln-app:${{ github.sha }} -f src/Dockerfile src/
        - name: Save image
          run: docker save vuln-app:${{ github.sha }} > image.tar
        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: docker-image
            path: image.tar
# ═══════════════════════════════════════
# 2. SAST - Analyse statique du code (Static Application Security Testing)
# Détecte les vulnérabilités dans le CODE SOURCE : injection SQL, XSS, failles de sécurité
# Outil : Semgrep avec règles OWASP Top 10, security-audit, et détection de secrets
# ═══════════════════════════════════════
 sast:
  name: 🔍 SAST
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - name: Run Semgrep
      uses: returntocorp/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/secrets
          p/owasp-top-ten
# ═══════════════════════════════════════
# 3. SCA - Analyse des dépendances (Software Composition Analysis)
# Détecte les vulnérabilités dans les BIBLIOTHÈQUES et packages tiers (npm, etc.)
# Outil : npm audit pour vérifier les CVE connues dans les dépendances Node.js
# ═══════════════════════════════════════
 sca:
  name: 📦 SCA
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      working-directory: ./src
      run: npm install
    - name: npm audit
      working-directory: ./src
      run: |
        npm audit --json > audit.json
        npm audit
    - uses: actions/upload-artifact@v4
      with:
        name: npm-audit
        path: src/audit.json
# ═══════════════════════════════════════
# 4. SECRET DETECTION
# Détecte les SECRETS accidentellement committés : clés API, mots de passe, tokens
# Outil : Gitleaks qui scanne tout l'historique Git (fetch-depth: 0)
#
# ⚠ Critique : évite les fuites de credentials et violations de sécurité
# ═══════════════════════════════════════
 secrets:
  name: 🔐 Secrets
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
# ═══════════════════════════════════════
# 5. CONTAINER SCAN
# Scanne l'IMAGE DOCKER pour détecter les vulnérabilités dans l'OS et les packages système
# Outil : Trivy qui analyse les CVE dans les couches Docker (image de base, packages installés)
# Recherche les vulnérabilités CRITICAL uniquement (pragmatisme DevSecOps)
# ═══════════════════════════════════════
 container-scan:
  name: 🐳 Container Scan
  runs-on: ubuntu-latest
  needs: build
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: docker-image
    - name: Load image
      run: docker load < image.tar
    - name: Trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: vuln-app:${{ github.sha }}
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL'

 dast:
    name: ⚡ DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load and Run Application
        run: |
          # Chargement de l'image buildée précédemment
          docker load < image.tar
          
          # Lancement de l'application sur le réseau 'host' 
          # Cela permet à ZAP (dans Docker) de voir localhost:3000
          docker run -d --network host --name vuln-app vuln-app:${{ github.sha }}
          
          # Pause pour laisser le temps à Node.js de démarrer
          echo "Waiting for application to start..."
          sleep 15

      - name: Prepare ZAP Reports and Permissions
        run: |
          # Création des fichiers avec les droits d'écriture pour l'utilisateur ZAP (UID 1000)
          sudo touch report_json.json report_md.md report_html.html
          sudo chmod 777 report_json.json report_md.md report_html.html
          # On s'assure que le dossier courant appartient à l'utilisateur ZAP pour le fichier zap.yaml
          sudo chown -R 1000:1000 ${{ github.workspace }}

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          # Cible le localhost du runner (accessible via --network host)
          target: 'http://localhost:3000'
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          # -d : mode debug pour voir les erreurs de connexion
          # -I : ne pas faire échouer le pipeline si des alertes sont trouvées (permet de voir le rapport)
          cmd_options: '-d -I'
          artifact_name: 'zap-report'

      - name: Cleanup
        if: always()
        run: |
          docker stop vuln-app || true
          docker rm vuln-app || true

# ═══════════════════════════════════════
# 6. RAPPORT FINAL
# Génère un résumé de tous les scans de sécurité
# Vérifie le statut de chaque job et fait ÉCHOUER le pipeline si des vulnérabilités sont détectées
# S'exécute toujours (if: always()) même si des jobs précédents ont échoué
# ═══════════════════════════════════════
 report:
  name: 📊 Report
  runs-on: ubuntu-latest
  needs: [sast, sca, secrets, container-scan]
  if: always()
  steps:
    - name: Generate JSON Report
      run: |
        echo '{
          "timestamp": "'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'",
          "repository": "'${{ github.repository }}'",
          "commit": "'${{ github.sha }}'",
          "branch": "'${{ github.ref_name }}'",
          "workflow_run": "'${{ github.run_id }}'",
          "results": {
            "sast": {
              "status": "'${{ needs.sast.result }}'",
              "tool": "Semgrep"
            },
            "sca": {
              "status": "'${{ needs.sca.result }}'",
              "tool": "npm audit"
            },
            "secrets": {
              "status": "'${{ needs.secrets.result }}'",
              "tool": "Gitleaks"
            },
            "container_scan": {
              "status": "'${{ needs.container-scan.result }}'",
              "tool": "Trivy"
            }
          },
          "summary": {
            "total_checks": 4,
            "passed": "'$(echo "${{ needs.sast.result }} ${{ needs.sca.result }} ${{ needs.secrets.result }} ${{ needs.container-scan.result }}" | grep -o "success" | wc -l)'",
            "failed": "'$(echo "${{ needs.sast.result }} ${{ needs.sca.result }} ${{ needs.secrets.result }} ${{ needs.container-scan.result }}" | grep -o "failure" | wc -l)'",
            "overall_status": "'$(if [[ "${{ needs.sast.result }}" == "failure" || "${{ needs.sca.result }}" == "failure" || "${{ needs.secrets.result }}" == "failure" || "${{ needs.container-scan.result }}" == "failure" ]]; then echo "failure"; else echo "success"; fi)'"
          }
        }' > security-report.json
        echo "📄 Security Report Generated:"
        cat security-report.json | jq '.'
    - name: Upload JSON Report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: security-report.json
    - name: Summary
      run: |
        echo "## 🔒 Security Scan Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
        echo "- SAST: ${{ needs.sast.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- SCA: ${{ needs.sca.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Secrets: ${{ needs.secrets.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Container Scan: ${{ needs.container-scan.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📥 **JSON Report available in artifacts**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ needs.sast.result }}" == "failure" ]] || \
           [[ "${{ needs.sca.result }}" == "failure" ]] || \
           [[ "${{ needs.secrets.result }}" == "failure" ]] || \
           [[ "${{ needs.container-scan.result }}" == "failure" ]]; then
          echo "❌ **Security issues detected!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠ Please review the failed jobs above" >> $GITHUB_STEP_SUMMARY
          exit 1
        else
          echo "✅ All security checks passed" >> $GITHUB_STEP_SUMMARY
        fi